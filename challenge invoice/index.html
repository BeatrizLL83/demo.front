<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Desafío factura</title>
  <link rel="icon" type="image/svg" href="./favicon.svg" />
  <link rel="stylesheet" href="index.css">
  <script type="module" src="main.js" defer></script>
</head>
<body>
  <main class="factura-contenedor">
    <section id="invoice-card">
      
      <header class="factura-header">
        <img src="./favicon.svg" alt="Logo Empresa" width="60">
        <h1>FACTURA DE VENTA</h1>
      </header>
      
      <div class="factura-info">
        <p>He hecho este ejercicio usando <b>propiedades privadas</b> con la almohadilla (#) para que los datos no se puedan tocar desde fuera del objeto.</p>
        
        <p class="aviso">Por favor, pulsa <b>F12</b> y mira la <b>Consola</b> para ver el desglose de los artículos, el IVA y el precio total.</p>
      </div>

    </section>
  </main>

</html>
